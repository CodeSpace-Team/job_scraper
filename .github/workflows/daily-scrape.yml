name: Daily Job Scraper

on:
  schedule:
    # Run at 6 AM UTC every day (8 AM SAST)
    - cron: '0 6 * * *'
  
  # Allow manual triggering from Actions tab
  workflow_dispatch:
    inputs:
      skip_linkedin:
        description: 'Skip LinkedIn scraping'
        required: false
        type: boolean
        default: false
      skip_enrichment:
        description: 'Skip AI enrichment'
        required: false
        type: boolean
        default: false

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Generous timeout for all scrapers
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install python-jobspy pandas requests anthropic gspread oauth2client
      
      - name: Run scraping pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          # Build command with optional flags
          CMD="python main_scraper.py --spreadsheet-id $SPREADSHEET_ID --skip-linkedin"
          
          if [ "${{ github.event.inputs.skip_linkedin }}" = "true" ]; then
            CMD="$CMD --skip-linkedin"
          fi
          
          if [ "${{ github.event.inputs.skip_enrichment }}" = "true" ]; then
            CMD="$CMD --skip-enrichment"
          fi
          
          # Run the pipeline
          $CMD
      
      - name: Archive job data (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-data-${{ github.run_number }}
          path: |
            *.json
          retention-days: 7
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Job scraping pipeline failed. Check logs above."
          echo "Common issues:"
          echo "  - Rate limiting (especially LinkedIn)"
          echo "  - API credentials expired"
          echo "  - Source website changes"
