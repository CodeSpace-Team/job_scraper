name: Daily Job Scraper

on:
  schedule:
    - cron: '0 6 * * *'
  
  workflow_dispatch:
    inputs:
      skip_linkedin:
        description: 'Skip LinkedIn scraping'
        required: false
        type: boolean
        default: true
      skip_enrichment:
        description: 'Skip AI enrichment'
        required: false
        type: boolean
        default: true

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install python-jobspy pandas requests anthropic gspread oauth2client beautifulsoup4 tls-client
      
      - name: Create data directory
        run: mkdir -p data/cache

      # ─── Debug: Check if GOOGLE_SHEETS_CREDS is set ────────────────────
      - name: Debug - Check Google Sheets credentials
        env:
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
        run: |
          if [ -z "$GOOGLE_SHEETS_CREDS" ]; then
            echo "::error::GOOGLE_SHEETS_CREDS is empty or not set"
            exit 1
          else
            echo "✅ GOOGLE_SHEETS_CREDS is set (length: ${#GOOGLE_SHEETS_CREDS})"
          fi
      
      - name: Run scraping pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          export PYTHONPATH="${PYTHONPATH}:."
          
          # ─── Build command from scratch ────────────────────────────────
          CMD="python -m src.main --spreadsheet-id $SPREADSHEET_ID"
          
          # Always skip LinkedIn and PNet
          CMD="$CMD --skip-linkedin --skip-pnet"
          
          # Skip enrichment by default (unless manually overridden)
          if [ "${{ github.event.inputs.skip_enrichment }}" != "false" ]; then
            CMD="$CMD --skip-enrichment"
          fi
          
          # Manual override: allow LinkedIn only if explicitly requested
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.skip_linkedin }}" = "false" ]; then
            # Remove --skip-linkedin from the command
            CMD="${CMD/ --skip-linkedin/}"
            echo "Manual run: INCLUDING LinkedIn"
          fi
          
          echo "Running: $CMD"
          $CMD
      
      - name: Archive job data (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-data-${{ github.run_number }}
          path: |
            data/cache/*.json
          retention-days: 7
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Job scraping pipeline failed. Check logs above."
          echo "Common issues:"
          echo "  - Rate limiting (especially LinkedIn)"
          echo "  - API credentials expired"
          echo "  - Source website changes"